name: labs-hourly

# Durable scheduler for the autonomous Labs routine: every hour, generate 3
# prototypes, judge with evolving taste, ship 1 to /labs on main (green-gated).
#
# Requires one repo secret: ANTHROPIC_API_KEY (Settings → Secrets → Actions).
# Without it the job no-ops. Disable from the Actions tab to pause the routine.

on:
  schedule:
    - cron: "17 * * * *" # hourly, off the :00 mark
  workflow_dispatch: {} # allow manual runs from the Actions tab

concurrency:
  group: labs-hourly # never overlap two runs
  cancel-in-progress: false

permissions:
  contents: write # the routine commits + pushes to main

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install deps
        run: pnpm install --frozen-lockfile

      - name: Install Playwright Chromium
        run: pnpm exec playwright install --with-deps chromium

      - name: Configure git identity
        run: |
          git config user.name "labs-auto"
          git config user.email "labs-auto@users.noreply.github.com"

      - name: Run the Labs routine
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # Headless agent run: follow the committed skill, which invokes the
          # labs-auto workflow and ships the winner to main.
          prompt: >
            Run the labs-auto routine now. Follow .claude/skills/labs-auto/SKILL.md:
            ensure a clean main working tree, then invoke the labs-auto workflow
            (Workflow tool, name "labs-auto") and let it run to completion. It
            generates 3 prototypes, judges with the taste in agent/labs/TASTE.md,
            and ships exactly 1 to /labs, committing and pushing to main only if
            the static build is green. Do not push if the build is not green.
            When done, print one line: what shipped (slug + commit) or no-ship.
          claude_args: "--max-turns 60"
